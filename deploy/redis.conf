# Redis configuration for Render deployment (single-container)
# Optimized for low memory usage

bind 127.0.0.1
port 6379
daemonize no

# Memory management - limit to 64MB for starter tier
maxmemory 64mb
maxmemory-policy allkeys-lru

# Disable persistence (Render has ephemeral disk)
save ""
appendonly no

# Logging
loglevel warning
logfile ""

# Performance
tcp-backlog 128
timeout 300
tcp-keepalive 60
