version: "3.9"

services:
  # --- Application Backend ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trading:trading_secret@postgres:5432/trading_system
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    volumes:
      - app_logs:/app/logs
    networks:
      - trading_network

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading_secret
      POSTGRES_DB: trading_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  # --- Redis Cache & Event Bus ---
  redis:
    image: redis:7
    container_name: trading_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  # --- Dashboard (Vite React Frontend) ---
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: trading_dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - trading_network

volumes:
  postgres_data:
  redis_data:
  app_logs:

networks:
  trading_network:
    driver: bridge
